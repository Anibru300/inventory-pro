services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_DB: inventory_pro
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: inventory-redis
    ports:
      - "6379:6379"
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Laravel API
  api:
    build:
      context: ../inventory-pro-api
      dockerfile: ../docker/api/Dockerfile
    container_name: inventory-api
    working_dir: /var/www/html
    volumes:
      - ../inventory-pro-api:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - /var/www/html/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=inventory_pro
      - DB_USERNAME=inventory_user
      - DB_PASSWORD=inventory_pass_2024
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inventory-network
    command: >
      sh -c "mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs && chmod -R 777 bootstrap storage && composer install --no-interaction && php-fpm"

  # Vue.js Frontend
  web:
    build:
      context: ../inventory-pro-web
      dockerfile: ../docker/web/Dockerfile
    container_name: inventory-web
    ports:
      - "5173:5173"
    volumes:
      - ../inventory-pro-web:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - NODE_ENV=development
    networks:
      - inventory-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: inventory-nginx
    ports:
      - "80:80"
    volumes:
      - ../inventory-pro-api:/var/www/html
    depends_on:
      - api
      - web
    networks:
      - inventory-network

volumes:
  postgres_data:

networks:
  inventory-network:
    driver: bridge