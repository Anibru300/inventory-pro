server {
    listen 10000;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Logging
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # CORS headers for all responses
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-Tenant-ID, Accept, Origin' always;
    add_header 'Access-Control-Expose-Headers' 'Authorization' always;

    # Handle preflight OPTIONS requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Laravel PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        
        # Standard fastcgi params
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # CRITICAL: Pass Authorization header to PHP using mapped variable from nginx.conf
        fastcgi_param HTTP_AUTHORIZATION $auth_header;
        
        # Alternative: pass through all headers
        fastcgi_pass_header Authorization;
    }

    # Handle Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
